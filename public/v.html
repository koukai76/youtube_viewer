<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>youtube</title>

    <style>
      body {
        margin: 0;
        background: #f7f7f7;

        /* 上下左右中央 */
        display: flex;
        justify-content: center;
        align-items: center;

        /* 画面いっぱい */
        min-height: 100vh;

        /* 余白 */
        padding: 20px;

        box-sizing: border-box;
      }

      .movie-wrap {
        width: 100%;
        max-width: 1200px; /* 横に広げる */
      }

      #movie {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: none;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="movie-wrap">
      <iframe
        id="movie"
        src="https://www.youtube.com/embed/bYzH7po55K4"
        allowfullscreen
      ></iframe>
    </div>

    <script src="v.js"></script>
  </body>
</html>
